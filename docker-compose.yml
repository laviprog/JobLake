x-airflow-common: &airflow-common
  image: apache/airflow:3.2.1-python3.12
  environment:
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-joblake}:${POSTGRES_PASSWORD:-joblake}@postgres:5432/${AIRFLOW_DB:-airflow_db}
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    AIRFLOW__API__SECRET_KEY: ${AIRFLOW_API_SECRET_KEY:-change-me}
    REPO_ROOT: /opt/airflow
  user: "${AIRFLOW_UID:-50000}:0"
  volumes:
    - ./src/dags:/opt/airflow/dags
    - ./configs:/opt/airflow/configs:ro
    - ./logs/airflow:/opt/airflow/logs
    - ./src/spark-apps:/opt/spark-apps:ro
  networks:
    - joblake-network

services:
  postgres:
    image: postgres:15
    container_name: joblake-postgres
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-joblake}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-joblake}
      POSTGRES_DB: ${POSTGRES_DB:-airflow_db}
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d:ro
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - joblake-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-joblake} -d ${POSTGRES_DB:-airflow_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    container_name: joblake-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username ${AIRFLOW_USER:-admin} \
          --firstname JobLake \
          --lastname Admin \
          --role Admin \
          --email ${AIRFLOW_EMAIL:-admin@example.com} \
          --password ${AIRFLOW_PASSWORD:-admin} || true
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  airflow-api-server:
    <<: *airflow-common
    container_name: joblake-airflow-api-server
    command: api-server
    ports:
      - "127.0.0.1:9900:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    container_name: joblake-airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-dag-processor:
    <<: *airflow-common
    container_name: joblake-airflow-dag-processor
    command: dag-processor
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:8.0.0
    container_name: joblake-kafka
    ports:
      - "127.0.0.1:9092:9092"
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - ./data/kafka:/var/lib/kafka/data
    networks:
      - joblake-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  kafbat-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: joblake-kafbat-ui
    ports:
      - "127.0.0.1:9090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - joblake-network
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: joblake-minio
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-adminadmin}
    command: server /data --console-address ":9001"
    volumes:
      - ./data/minio:/data
    networks:
      - joblake-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: joblake-minio-init
    entrypoint: /bin/sh
    command:
      - -c
      - |
        mc alias set local http://minio:9000 ${MINIO_USER:-admin} ${MINIO_PASSWORD:-adminadmin}
        mc mb --ignore-existing local/${JOBLAKE_BUCKET:-joblake}
        mc anonymous set none local/${JOBLAKE_BUCKET:-joblake}
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - joblake-network
    restart: "no"

  iceberg-rest:
    image: tabulario/iceberg-rest:1.6.0
    container_name: joblake-iceberg-rest
    ports:
      - "127.0.0.1:8181:8181"
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-admin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-adminadmin}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      CATALOG_WAREHOUSE: ${JOBLAKE_WAREHOUSE:-s3://joblake/warehouse}
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
    depends_on:
      minio-init:
        condition: service_completed_successfully
    networks:
      - joblake-network
    restart: unless-stopped

  spark-master:
    build:
      context: .
      dockerfile: docker/Dockerfile.spark
    container_name: joblake-spark-master
    hostname: spark-master
    ports:
      - "127.0.0.1:8000:8080"
      - "127.0.0.1:7077:7077"
    environment:
      SPARK_NO_DAEMONIZE: "true"
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_RAW_VACANCIES: joblake.raw.vacancies
      JOBLAKE_WAREHOUSE: s3://joblake/warehouse
      ICEBERG_REST_URI: http://iceberg-rest:8181
      S3_ENDPOINT: http://minio:9000
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-admin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-adminadmin}
      AWS_REGION: ${AWS_REGION:-us-east-1}
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    volumes:
      - ./src/spark-apps:/opt/spark-apps
      - ./data/spark:/opt/spark-data
    depends_on:
      iceberg-rest:
        condition: service_started
      kafka:
        condition: service_healthy
    networks:
      - joblake-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  spark-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.spark
    container_name: joblake-spark-worker
    hostname: spark-worker
    ports:
      - "127.0.0.1:8081:8081"
    environment:
      SPARK_NO_DAEMONIZE: "true"
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    volumes:
      - ./src/spark-apps:/opt/spark-apps
      - ./data/spark:/opt/spark-data
    depends_on:
      spark-master:
        condition: service_healthy
    networks:
      - joblake-network
    restart: unless-stopped

  trino:
    image: trinodb/trino:480
    container_name: joblake-trino
    ports:
      - "127.0.0.1:8082:8080"
    volumes:
      - ./trino/catalog:/etc/trino/catalog:ro
    depends_on:
      iceberg-rest:
        condition: service_started
    networks:
      - joblake-network
    restart: unless-stopped

  collector:
    build: ./src/collector
    container_name: joblake-collector
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - joblake-network
    profiles:
      - jobs

  agent:
    build: ./src/agent
    container_name: joblake-agent
    ports:
      - "127.0.0.1:8088:8080"
    depends_on:
      trino:
        condition: service_started
    networks:
      - joblake-network
    restart: unless-stopped

  app:
    build: ./src/app
    container_name: joblake-app
    ports:
      - "127.0.0.1:8501:8501"
    depends_on:
      trino:
        condition: service_started
      agent:
        condition: service_started
    networks:
      - joblake-network
    restart: unless-stopped

networks:
  joblake-network:
    name: joblake-network
    driver: bridge
